variables:
  PACKAGE_REGISTRY_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/"
  PACKAGE_NAME: "standalone-python"
  # This is a magic request parameter to get the file attribute of the package, 
  # See: https://docs.gitlab.com/ee/user/packages/generic_packages/index.html#publish-a-package-file
  GET_FILE_ATTR_MAGIC: "select=package_file" 

stages:
  - build
  - generate_release_tag
  - upload
  - generate_release_note
  - release

build:
  stage: build
  before_script:
    - (sudo apt-get update -y && sudo apt-get install -y gzip) || true
  script:
    - docker build -f ./${version}/${architecture}/Dockerfile -t release-${PACKAGE_NAME}:${version}-${architecture} . 1>${version}-${architecture}.log 2>&1
    - docker run --rm release-${PACKAGE_NAME}:${version}-${architecture} /opt/python/bin/pip --version
    # Cross-version stdlib smoke. Exercises ssl (OpenSSL), hashlib digests,
    # sqlite3, zlib, bz2, lzma (Py3-only; self-skips on 2.7), ctypes, curses,
    # readline, socket, subprocess, threading, json. Exits non-zero if any
    # section fails, so CI catches regressions in the shipped libc / deplib
    # chain without us having to keep the inline check in sync by hand.
    - |
      docker run --rm \
        -v "${CI_PROJECT_DIR}/ci/smoke_stdlib.py:/tmp/smoke_stdlib.py:ro" \
        release-${PACKAGE_NAME}:${version}-${architecture} \
        /opt/python/bin/python /tmp/smoke_stdlib.py
    # End-to-end compatibility check: install a native-extension wheel from
    # PyPI (exercises the musllinux tag hook) and run a broad surface-area
    # smoke test against the shipped libc / /proc / subprocess plumbing.
    # smoke_psutil.py uses Py3-only syntax (f-strings), so skip it on 2.7.
    # Skip on 2.7 (no f-strings in the script) and on free-threaded builds
    # (PyPI doesn't ship `cp3Nt` psutil wheels yet → sdist fallback → source
    # build in the debian final image would hit the glibc-headers mismatch).
    - |
      case "$version" in
        2.7|*t) ;;
        *)
          docker run --rm \
            -v "${CI_PROJECT_DIR}/ci/smoke_psutil.py:/tmp/smoke_psutil.py:ro" \
            release-${PACKAGE_NAME}:${version}-${architecture} \
            sh -c '/opt/python/bin/pip install --quiet --no-cache-dir psutil && /opt/python/bin/python /tmp/smoke_psutil.py'
          ;;
      esac
    # Tkinter smoke. Non-blocking — the Alpine `cp -a` approach in
    # build_tk.sh has transitive-dep gaps (libbz2.so.1, libpng.so.16,
    # fontconfig data …). See the TODO block in build_tk.sh for the
    # full from-source X11 stack that would fix this properly. Until
    # that lands, this step is allowed to fail so the rest of CI keeps
    # signalling useful status. `|| true` makes the failure visible in
    # the log but doesn't abort the job.
    - |
      docker run --rm \
        -v "${CI_PROJECT_DIR}/ci/smoke_tkinter.py:/tmp/smoke_tkinter.py:ro" \
        release-${PACKAGE_NAME}:${version}-${architecture} \
        /opt/python/bin/python /tmp/smoke_tkinter.py \
        || echo "tkinter smoke FAILED — known issue, non-blocking (TODO: build X11 from source)"
    - docker save release-${PACKAGE_NAME}:${version}-${architecture} > release-${version}-${architecture}.tar
    - bash ci/packing_release_tar.sh release-${version}-${architecture}.tar
    - gzip -9 build/release-${version}-${architecture}.tar
  artifacts:
    paths: ["build/release-${version}-${architecture}.tar.gz", "${version}-${architecture}.log"]
  parallel:
    matrix:
      - version: ["3.15", "3.14", "3.13", "3.12", "3.11", "3.10", "2.7", "3.15t", "3.14t", "3.13t"]
        architecture: ["x86_64", "x86"]
  tags: [shell]
  rules:
    # Python 3.15 is still in alpha and pip 26.0.1 (bundled in get-pip.py)
    # doesn't yet implement `Distribution.locate_file`, which 3.15 enforces.
    # Let those cells fail non-blockingly until upstream pip catches up.
    - if: '$CI_COMMIT_TAG == null && $version =~ /^3\.15/'
      allow_failure: true
    - if: $CI_COMMIT_TAG == null

generate_release_tag:
  stage: generate_release_tag
  script:
    - echo release-$(date '+%Y-%m-%d') > .release_tag
    - git config --global user.email "ci@teamt5.org"
    - git config --global user.name "CI"
    - git remote set-url origin "https://gitlab-ci-token:${GIT_TOKEN}@${CI_REPOSITORY_URL#*@}"
    - (git tag $(cat .release_tag)) || true
    - git push origin --tags
  artifacts:
    paths: [".release_tag"]
  tags: [shell]
  rules:
    - if: $CI_COMMIT_TAG == null

upload:
  stage: upload
  needs: [build]
  script:
    - export PACKAGE_VERSION=$(date '+%Y-%m-%d')
    - |
      curl \
      --header "JOB-TOKEN: $CI_JOB_TOKEN" \
      --upload-file build/release-${version}-${architecture}.tar.gz \
      "${PACKAGE_REGISTRY_URL}${PACKAGE_NAME}/${PACKAGE_VERSION}/release-${version}-${architecture}.tar.gz?${GET_FILE_ATTR_MAGIC}" >> ${version}-${architecture}-result.txt
  parallel:
    matrix:
      - version: ["3.15", "3.14", "3.13", "3.12", "3.11", "3.10", "2.7", "3.15t", "3.14t", "3.13t"]
        architecture: ["x86_64", "x86"]
  artifacts:
    paths: ["*-result.txt"]
  tags: [shell]
  rules:
    - if: $CI_COMMIT_TAG == null

generate_release_note:
  stage: generate_release_note
  needs:
    - job: upload
      artifacts: true
    - job: generate_release_tag
      artifacts: true
  before_script:
    - (sudo apt-get update -y && sudo apt-get install jq -y) || true
  script:
  - |
    export TAG_NAME="$(cat .release_tag)"
    echo "TAG_NAME=${TAG_NAME}"
    cat *-result.txt
    for res in $(ls *-result.txt); do
      url=$(cat $res | jq -r '.file.url')
      echo && echo "url=${url}"
      filename=$(echo "$url" | sed -n "s|.*\(release.*\).tar.gz|\1|p");
      file_id=$(echo "$url" | sed -n 's/.*\/files\/\([0-9]\+\)\/.*/\1/p');
      echo "- [🐍 $filename](/../../package_files/${file_id}/download)" >> generated_release_notes.txt
    done
    echo >> generated_release_notes.txt
  artifacts:
    paths: ["generated_release_notes.txt"]
  tags: [shell]
  rules:
    - if: $CI_COMMIT_TAG == null

release:
  stage: release
  needs:
    - job: generate_release_note
      artifacts: true
    - job: generate_release_tag
      artifacts: true
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
  - |
    export TAG_NAME="$(cat .release_tag)"
    echo "TAG_NAME=${TAG_NAME}"
  - |
    release-cli create --name "${PACKAGE_NAME}" \
    --ref "${CI_COMMIT_REF_NAME}" \
    --tag-name "${TAG_NAME}" \
    --description generated_release_notes.txt
  rules:
    - if: $CI_COMMIT_TAG == null
